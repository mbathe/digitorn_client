<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Primary meta tags -->
  <title>Digitorn — Build, run and ship AI agents in minutes</title>
  <meta name="title" content="Digitorn — Build, run and ship AI agents in minutes">
  <meta name="description" content="Digitorn is an AI agent runtime, app store, and builder — turn a chat into a working app in minutes. Bring your models, your tools, your data.">
  <meta name="keywords" content="AI agents, agent runtime, app builder, LLM, chat, workflow automation, Digitorn">
  <meta name="theme-color" content="#0D0D0D">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://digitorn.dev/">

  <!-- Open Graph — Facebook, LinkedIn, Slack, Discord -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://digitorn.dev/">
  <meta property="og:site_name" content="Digitorn">
  <meta property="og:title" content="Digitorn — Build, run and ship AI agents in minutes">
  <meta property="og:description" content="An AI agent runtime, app store, and builder. Turn a chat into a working app in minutes.">
  <meta property="og:image" content="https://digitorn.dev/icons/Icon-512.png">
  <meta property="og:image:alt" content="Digitorn logo">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Digitorn — Build, run and ship AI agents in minutes">
  <meta name="twitter:description" content="An AI agent runtime, app store, and builder. Turn a chat into a working app in minutes.">
  <meta name="twitter:image" content="https://digitorn.dev/icons/Icon-512.png">
  <meta name="twitter:image:alt" content="Digitorn logo">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Digitorn">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
